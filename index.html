<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Detailing Tutorials</title>
    <meta
      name="description"
      content="Jednoducha landing page pre car detailing tutorialy."
    />
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1e293b 0%, #0f172a 55%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .hero {
        width: min(760px, 100%);
        background: rgba(30, 41, 59, 0.85);
        border: 1px solid rgba(203, 213, 225, 0.25);
        border-radius: 18px;
        padding: 36px;
        text-align: center;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.2rem);
        margin: 0 0 12px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.15rem);
      }

      .badge {
        display: inline-block;
        margin-top: 20px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.2);
        border: 1px solid rgba(245, 158, 11, 0.4);
        color: #fde68a;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <h1>Hello World</h1>
      <p>Vitaj na mojej car detailing stranke s tutorialmi.</p>
      <span class="badge">GitHub Pages ready</span>
    </main>
  </body>
</html>
